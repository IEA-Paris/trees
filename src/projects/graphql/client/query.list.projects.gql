query listProjects(
  $appId: ID = "iea"
  $lang: String = "en"
  $options: ListInput = {}
) {
  listProjects(options: $options, appId: $appId, lang: $lang) {
    total
    items {
      date
      disciplines {
        name
        slug
      }
      featured
      image {
        alt
        backgroundColor
        caption
        license
        copyright
        licenseUrl
        url
      }
      type
      name
      state
      summary
      url
      tags {
        createdAt
        description
        icon
        name
        updatedAt
      }
      slug
    }
  }
}
