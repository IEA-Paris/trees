type Publication {
  appId: String
  name: String!
  subtitle: String
  description: String
  summary: String
  type: publicationType
  url: AWSURL
  affiliations: [Affiliation]
  authors: [RelatedPeople]
  related: Related
  gallery: [Image]
  image: Image
  video: Video
  tags: [Tag]
  files: [File]
  eventCategories: eventCategories
  newsCategory: newsCategories
  disciplines: [Disciplines]
  color: String
  date: AWSDateTime
  featured: AWSDateTime
  slug: String
  score: Float
}

type PublicationFilters {
  affiliations: [String!]
  tags: [String!]
  disciplines: [String!]
  type: [publicationType!]
  eventCategories: [eventCategories!]
  newsCategory: [newsCategories!]
}

type PublicationsList {
  total: Int!
  items: [Publication]
}
