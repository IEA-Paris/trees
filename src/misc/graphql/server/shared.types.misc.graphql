type Entity_sm {
  name: String!
  description: String
  logo: String
}

type Filters {
  events: EventFilters
  fellowships: FellowshipFilters
  news: NewsFilters
  projects: ProjectFilters
  people: PeopleFilters
  publications: PublicationFilters
}

type Nomenclature {
  version: String!
  settings: NomenclatureSettings!
  data: [Wikipedia!]!
}

type NomenclatureSettings {
  lang: [String!]
  defaultLang: String
  extended: Boolean
}

type Profile {
  country: Int
  firstname: String!
  lastname: String!
  position: String
  image: Image
  references: [String]
  presentation: String
  twitter: String
  linkedin: String
  wikipedia: String
}

# Global search results, dispatched into modifier-based sub-categories that
# mirror the MODIFIERS server config (apex-backend-lib/constants/listQuery.js).
# Each sub-category reuses the parent collection's *List type. People may
# legitimately appear in several group sub-categories (groups.* are independent
# booleans), so those totals must not be summed as a unique people count.
type SearchList {
  # events (unchanged)
  events: EventsList
  # fellowship (unchanged)
  fellowships: FellowshipList
  # People -> groups.*
  team: PeopleList
  sab: PeopleList
  board: PeopleList
  ethics: PeopleList
  fellows: PeopleList
  # Collective Intelligence (projects) -> type
  initiatives: ProjectsList
  tools: ProjectsList
  projects: ProjectsList
  # Resources (publications) -> type
  media: PublicationsList
  publications: PublicationsList
  news: PublicationsList
}

type Settings {
  lang: String
}

type Slot {
  firstname: String!
  lastname: String!
  email: AWSEmail!
  institution: String
  lang: String!
}

type AltchaVerification {
  valid: Boolean!
  verified: Boolean!
}

type Token {
  accessToken: String!
}

type TokenAndUser {
  accessToken: String
  user: User
}
